name: Deploy FastAPI app to Azure Web App - resume-parser-api-hp-260406

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-resume-parser-api-hp-260406
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Print Python version
        run: python --version

      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Print installed packages
        run: pip list

      - name: Validate FastAPI entry files
        run: |
          python -c "import os; assert os.path.exists('main.py'), 'main.py not found'; assert os.path.exists('requirements.txt'), 'requirements.txt not found'"

      - name: Create deployment package
        run: zip -r app.zip . -x ".git/*" ".github/*" "venv/*" ".venv/*" "__pycache__/*"

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure FastAPI startup command
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --name resume-parser-api-hp-260406 \
              --resource-group resume-parser-rg \
              --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Enable App Service logs
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp log config \
              --name resume-parser-api-hp-260406 \
              --resource-group resume-parser-rg \
              --application-logging filesystem \
              --level information \
              --web-server-logging filesystem \
              --detailed-error-messages true \
              --failed-request-tracing true

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: resume-parser-api-hp-260406
          package: app.zip

      - name: Show startup logs (best effort)
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            mkdir -p logs
            az webapp log download \
              --name resume-parser-api-hp-260406 \
              --resource-group resume-parser-rg \
              --log-file logs/webapp_logs.zip || true

            if [ -f logs/webapp_logs.zip ]; then
              unzip -o logs/webapp_logs.zip -d logs >/dev/null || true
              echo "Recent log files:"
              find logs -type f | head -n 20
              echo "Last lines from startup/runtime logs:"
              find logs -type f \( -name "*.log" -o -name "*.txt" \) -print0 | \
                xargs -0 -I {} sh -c 'echo "===== {} ====="; tail -n 100 "{}" || true'
            else
              echo "No logs archive available yet."
            fi