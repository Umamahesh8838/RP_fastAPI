name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install dependencies locally for testing
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run basic Python syntax check
      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile config.py
          python -m py_compile database.py

      # Test that app can be imported
      - name: Test app import
        run: python -c "from main import app; print('✓ App imported successfully')"

      # Test settings loading
      - name: Test settings
        run: python -c "from config import get_settings; s = get_settings(); print('✓ Settings loaded')"

      # Log in to Azure using OIDC (recommended)
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy using WebApps Deploy action with correct settings
      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'resume-parser-api-hp-260406'
          package: '.'
          startup-command: 'python -m uvicorn main:app --host 0.0.0.0 --port 8000'

      # Print deployment info
      - name: Print deployment info
        run: |
          echo "Deployment completed successfully!"
          echo "App URL: https://resume-parser-api-hp-260406.azurewebsites.net"
          echo "Health check: https://resume-parser-api-hp-260406.azurewebsites.net/health"

      # Test health endpoint after deployment
      - name: Test health endpoint
        run: |
          sleep 10  # Wait for app to start
          curl -f https://resume-parser-api-hp-260406.azurewebsites.net/health || echo "Health check failed - app still starting"
        continue-on-error: true
